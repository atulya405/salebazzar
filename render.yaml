services:
  - type: web
    name: salebazzar
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Salebazzar
      - key: APP_ENV
        value: production
      - key: RUN_SCAN_ON_STARTUP
        value: "false"
      - key: SCAN_INTERVAL_MINUTES
        value: "1080"
      - key: AMAZON_CREATORS_API_ENABLED
        value: "false"
      - key: AMAZON_CREATORS_API_MARKETPLACE
        value: www.amazon.in
      - key: AMAZON_AFFILIATE_TAG
        value: salebazzar02-21
      - key: CONTACT_EMAIL
        value: atulya405@gmail.com
