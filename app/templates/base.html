<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Salebazzar{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/styles.css') }}" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">SALE<span>BAZZAR</span></a>
        <div class="ms-auto">
          <a class="nav-link text-white d-inline-block" href="/">Deals</a>
          <a class="nav-link text-white d-inline-block" href="/about">About</a>
        </div>
      </div>
    </nav>
    {% block content %}{% endblock %}
    <footer class="container py-5 text-center text-secondary small">
      <div class="mb-2">Salebazzar indexes API-sourced offers. Verify the final price on the store before purchase.</div>
      <a href="/about">About</a> · <a href="/privacy">Privacy</a> · <a href="/disclosure">Affiliate Disclosure</a> · <a href="/contact">Contact</a>
    </footer>
  </body>
</html>
